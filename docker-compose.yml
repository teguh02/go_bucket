services:
  cdn:
    build: .
    container_name: cdn-storage
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    volumes:
      - ./storage:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
